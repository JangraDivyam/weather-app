<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App by jangra</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1 class="title">Weather by jangra</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Search city..." />
      <button onclick="getWeather()">Search</button>
    </div>

    <div class="card" id="weatherCard" style="display:none">
      <div class="city-name" id="cityName"></div>
      <div class="date" id="date"></div>
      <img class="weather-icon" id="weatherIcon" src="" alt="" />
      <div class="temp" id="temp"></div>
      <div class="description" id="description"></div>
      <div class="details">
        <div class="detail-box">
          <span class="label">Feels like</span>
          <span class="value" id="feelsLike"></span>
        </div>
        <div class="detail-box">
          <span class="label">Humidity</span>
          <span class="value" id="humidity"></span>
        </div>
        <div class="detail-box">
          <span class="label">Wind</span>
          <span class="value" id="wind"></span>
        </div>
        <div class="detail-box">
          <span class="label">Visibility</span>
          <span class="value" id="visibility"></span>
        </div>
      </div>
    </div>

    <div class="error" id="error" style="display:none">
      City not found. Please try again.
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
